on:
  push:
    branches:
      - main
      - development
  pull_request:
    types: [opened, synchronize, reopened]

name: Build backend with web frontend
jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: cargo test --release

  build-standalone-binary:
    name: Build standalone binary for ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            suffix: amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            suffix: arm64
          - target: armv7-unknown-linux-gnueabihf
            platform: linux/arm/v7
            suffix: armv7
          - target: arm-unknown-linux-musleabihf
            platform: linux/arm/v6
            suffix: armv6
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          docker-images: false
      - uses: actions/checkout@v3
      - name: Dotenv Action
        id: dotenv
        uses: falti/dotenv-action@v1.1.4
        with:
          path: versions.env
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build binary using Docker
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --target binary-exporter \
            --output type=local,dest=. \
            --build-arg RUST_VERSION=${{ steps.dotenv.outputs.rust_version }} \
            --build-arg FLUTTER_VERSION=${{ steps.dotenv.outputs.flutter_version }} \
            .
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: atrium-${{ matrix.suffix }}
          path: ./atrium-${{ matrix.suffix }}

  docker-build:
    name: Build backend with web frontend as docker image and push to docker hub
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          docker-images: false
      - name: Code Checkout
        uses: actions/checkout@v3
      - name: Dotenv Action
        id: dotenv
        uses: falti/dotenv-action@v1.1.4
        with:
          path: versions.env
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build the image
        run: |
          docker buildx build --push \
            --tag nicolaspernoud/atrium:"$([[ ${GITHUB_REF##*/} = main ]] && echo "latest" || echo "${GITHUB_REF##*/}")" \
            --platform linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64 \
            --build-arg RUST_VERSION=${{ steps.dotenv.outputs.rust_version }} \
            --build-arg FLUTTER_VERSION=${{ steps.dotenv.outputs.flutter_version }} \
            .

  app-build:
    name: Build frontend Android app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Dotenv Action
        id: dotenv
        uses: falti/dotenv-action@v1.1.4
        with:
          path: versions.env
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ steps.dotenv.outputs.flutter_version }}
      - name: Decode android/key.jks
        run: echo "${{ secrets.KEY_JKS }}" | base64 --decode > android/key.jks
      - name: Decode android/key.properties
        run: echo "${{ secrets.KEY_PROPERTIES }}" | base64 --decode > android/key.properties
      - name: Install pub Dependencies
        run: flutter pub get
      - name: Build Android App
        run: flutter build apk --split-per-abi
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: frontend/build/app/outputs/flutter-apk/*.apk

  release:
    name: Release App
    runs-on: ubuntu-latest
    needs: [build-standalone-binary, app-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Export Release Timestamp
        run: echo "APP_VERSION=$(date +'%Y-%m-%d_%H-%m-%S')" >> $GITHUB_ENV
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: atrium-*
          merge-multiple: true
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: apks
          path: apks
      - name: Release Apps
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.APP_VERSION }}
          name: ${{ env.APP_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "atrium-*,apks/*.apk"
      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.2.0
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
